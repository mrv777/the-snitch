# ---- HTTP server (pre-SSL + ACME challenge) ----
server {
    listen 80;
    server_name thesnitch.xyz;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect to HTTPS (uncomment after first certbot run)
    # return 301 https://$host$request_uri;

    # Direct proxy (use before SSL is configured)
    location / {
        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # SSE support — disable buffering for event streams
        proxy_buffering off;
        proxy_read_timeout 120s;
    }

    # Serve card PNGs directly from disk (faster than proxying)
    location /images/ {
        alias /usr/share/nginx/images/;
        expires 24h;
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }

    # Cache OG images
    location /api/og/ {
        proxy_pass http://app:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Cache-Control "public, max-age=86400";
    }
}

